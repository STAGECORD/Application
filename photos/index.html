<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAGECORD - Photos</title>
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/logo.css">
    <link rel="stylesheet" href="../css/topbar.css">

</head>
<body>
    <!-- Left Sidebar Navigation -->
    <aside class="sidebar" data-sidebar></aside>

    <!-- Top Bar -->
    <header class="topbar">
        <!-- Logo (left) -->
        <div class="logo-container" data-help="STAGECORD PRO-logoet. Klik for at vende tilbage til forsiden uanset hvor du er i platformen.">
            <a href="../index.html" class="logo-link">
                <h1 class="logo">
                    <span class="logo-stage">STAGE</span><span class="logo-cord">CORD</span>
                </h1>
            </a>
        </div>

        <!-- Search bar (middle) -->
        <div class="search-bar" data-help="Søgebar: Find artister, koncerter, spillesteder, venner og alt andet på platformen. Skriv mindst 2 tegn for at se forslag.">
            <input
                type="text"
                class="search-input"
                placeholder="Search Artists, Concerts, Venues, Friends and much more"
                aria-label="Search"
            />
            <svg class="search-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"/>
                <path d="M18 18L24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>

        <!-- Help button (right) -->
        <button type="button" class="help-button" aria-label="Help" aria-pressed="false" data-help="Hjælpeknap: Klik for at aktivere hjælpetilstand. Derefter kan du klikke på et vilkårligt element for at se en forklaring. Tryk Esc eller klik ? igen for at slukke.">
            <span class="help-mark">?</span>
        </button>
    </header>

        <div class="content-wrapper">

            <a href="../artist/index.html" class="photos-back" data-help="Tilbage til artist-profilen.">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Back to artist</span>
            </a>

            <h1 class="photos-page__heading">Photos</h1>

            <section class="photos-album" data-help="REGREDS Tour — billeder fra hele turnéen, sorteret efter dato.">

                    <span class="photos-album__meta">42 photos &middot; Updated Jun 2024</span>
                </header>
                <div class="photos-grid">

                    <a class="photo-tile" href="#" style="background: url('../assets/images/artists/nick-sander-event.jpg') center/cover;"></a>
                </div>
