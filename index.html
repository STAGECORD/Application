<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAGECORD - Join the Waitlist</title>
    <meta name="description" content="Join the STAGECORD waitlist. Be among the first to try the new platform for artists and fans.">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="css/waitlist.css">
</head>
<body class="signup-body">

    <header class="signup-topbar">
        <a href="/" class="signup-topbar__logo">
            <span class="logo-stage">STAGE</span><span class="logo-cord">CORD</span>
        </a>
    </header>

    <main class="signup-page">

        <aside class="signup-art" aria-hidden="true">
            <div class="signup-art__image signup-art__image--headphones"></div>
            <div class="signup-art__image signup-art__image--portrait"></div>
            <div class="signup-art__image signup-art__image--guitar"></div>
        </aside>

        <section class="signup-form-wrap">
            <h1 class="signup-welcome">Join the <strong>STAGECORD</strong> waitlist</h1>
            <p class="signup-subtitle">Be among the first to try STAGECORD. We're inviting early users in batches — leave your details and we'll reach out when it's your turn.</p>

            <form class="signup-form" id="waitlistForm" novalidate>
                <div class="signup-field">
                    <label class="signup-field__label" for="wl-name">Your name<span aria-hidden="true">*</span></label>
                    <div class="signup-field__input-wrap">
                        <input id="wl-name" type="text" name="name" placeholder="Full name" autocomplete="name" required>
                        <svg class="signup-field__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
                            <path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>

                <div class="signup-field">
                    <label class="signup-field__label" for="wl-email">Email<span aria-hidden="true">*</span></label>
                    <div class="signup-field__input-wrap">
                        <input id="wl-email" type="email" name="email" placeholder="Enter your email address" autocomplete="email" required>
                        <svg class="signup-field__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <rect x="3" y="6" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2"/>
                            <path d="M3 8l9 6 9-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>

                <div class="signup-field">
                    <label class="signup-field__label" for="wl-role">I'm a<span aria-hidden="true">*</span></label>
                    <div class="signup-field__input-wrap">
                        <select id="wl-role" name="role" required>
                            <option value="" disabled selected>Choose what describes you best</option>
                            <option value="artist">Artist</option>
                            <option value="fan">General user / Fan</option>
                        </select>
                    </div>
                </div>

                <div class="signup-field">
                    <label class="signup-field__label" for="wl-message">Anything you want us to know? <span class="signup-field__optional">(optional)</span></label>
                    <div class="signup-field__input-wrap signup-field__input-wrap--textarea">
                        <textarea id="wl-message" name="message" rows="3" placeholder="What are you hoping STAGECORD can help you with?"></textarea>
                    </div>
                </div>

                <p class="signup-terms">By joining the waitlist you agree to receive an email from us when your invite is ready.</p>

                <button type="submit" class="signup-submit" id="waitlistSubmit">Join waitlist</button>

                <div class="waitlist-feedback" id="waitlistFeedback" role="status" aria-live="polite"></div>
            </form>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/waitlist.js"></script>
</body>
</html>
