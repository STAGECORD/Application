<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>STAGECORD — Inbox</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/logo.css">
    <link rel="stylesheet" href="../css/start.css">
    <link rel="stylesheet" href="../css/app-shell.css">
    <link rel="stylesheet" href="../css/emoji-picker.css">
    <style>
        .inbox-page { max-width: 1080px; margin: 0 auto; padding: 24px 24px 60px; }
        .inbox-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 16px;
            min-height: 540px;
        }
        @media (max-width: 720px) {
            .inbox-grid { grid-template-columns: 1fr; }
            .inbox-list[data-mobile-hidden] { display: none; }
            .inbox-thread[data-mobile-hidden] { display: none; }
        }
        .inbox-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            display: flex; flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }
        .inbox-card__head {
            padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.06);
            color: #FFFFFF; font-weight: 600; font-size: 16px;
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .inbox-back {
            background: transparent; border: none; color: #7E89A6;
            cursor: pointer; font-size: 13px; font-family: inherit;
            display: none;
        }
        @media (max-width: 720px) { .inbox-thread .inbox-back { display: inline-flex; } }
        .inbox-back:hover { color: #FFFFFF; }
        .inbox-list__items { flex: 1; overflow-y: auto; }
        .inbox-empty { padding: 30px 20px; text-align: center; color: #7E89A6; font-size: 14px; }

        .convo {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            text-decoration: none; color: inherit;
        }
        .convo:hover { background: rgba(255,255,255,0.03); }
        .convo--active { background: rgba(56,134,252,0.08); }
        .convo__avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: #5A6480; font-size: 15px; font-weight: 600;
            flex-shrink: 0;
        }
        .convo__main { flex: 1; min-width: 0; }
        .convo__top {
            display: flex; align-items: center; gap: 8px;
            font-size: 14px;
        }
        .convo__name { color: #FFFFFF; font-weight: 300; flex: 1; min-width: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .convo__name strong { font-weight: 700; }
        .inbox-card__head strong { font-weight: 700; }
        .convo__time { color: #5A6480; font-size: 12px; flex-shrink: 0; }
        .convo__preview {
            color: #7E89A6; font-size: 13px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-top: 2px;
        }
        .convo__unread {
            background: #FF6B6B; color: #FFFFFF;
            font-size: 11px; font-weight: 600;
            min-width: 18px; height: 18px; padding: 0 6px;
            border-radius: 999px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-left: 6px; flex-shrink: 0;
        }

        .inbox-thread__messages {
            flex: 1; overflow-y: auto;
            padding: 16px 18px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .msg { display: flex; gap: 10px; align-items: flex-end; max-width: 80%; }
        .msg--out { margin-left: auto; flex-direction: row-reverse; }
        .msg__avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: #5A6480; font-size: 12px; font-weight: 600;
            flex-shrink: 0;
        }
        .msg__bubble {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #D1D6E0; font-size: 14px; line-height: 1.5;
            padding: 10px 14px; border-radius: 14px;
            white-space: pre-wrap; word-wrap: break-word;
        }
        .msg--out .msg__bubble {
            background: rgba(56,134,252,0.18); border-color: rgba(56,134,252,0.32);
            color: #FFFFFF;
        }
        .msg__time {
            font-size: 11px; color: #5A6480; margin-top: 4px;
        }

        .inbox-thread__composer {
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 12px 14px;
            display: flex; gap: 10px; align-items: center;
        }
        .inbox-thread__input {
            flex: 1; min-width: 0;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px; padding: 10px 16px; color: #FFFFFF;
            font-family: inherit; font-size: 14px;
        }
        .inbox-thread__send {
            background: #FFFFFF; color: #0B0B0F; border: none;
            border-radius: 999px; padding: 9px 18px;
            font-weight: 600; cursor: pointer; font-size: 13px;
        }
        .inbox-thread__send:disabled { opacity: 0.5; cursor: not-allowed; }

        .inbox-placeholder {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            color: #7E89A6; padding: 40px;
            text-align: center;
        }

        .inbox-compose-btn {
            background: rgba(56,134,252,0.18);
            border: 1px solid rgba(56,134,252,0.32);
            color: #FFFFFF;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 12px; font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .inbox-compose-btn:hover { background: rgba(56,134,252,0.28); }
        .inbox-compose-btn svg { width: 14px; height: 14px; }

        .compose-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: flex-start; justify-content: center;
            z-index: 1000;
            padding: 80px 16px 16px;
            overflow-y: auto;
        }
        .compose-overlay[data-open] { display: flex; }
        .compose-modal {
            background: #15171F;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            width: 100%; max-width: 440px;
            display: flex; flex-direction: column;
            overflow: hidden;
            max-height: calc(100vh - 100px);
        }
        .compose-modal__head {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: space-between;
        }
        .compose-modal__title { font-weight: 600; color: #FFFFFF; font-size: 15px; }
        .compose-modal__close {
            background: transparent; border: none; color: #7E89A6;
            font-size: 20px; cursor: pointer; line-height: 1;
            padding: 0 4px;
        }
        .compose-modal__close:hover { color: #FFFFFF; }
        .compose-modal__search {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .compose-modal__input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            padding: 9px 14px;
            color: #FFFFFF; font-family: inherit; font-size: 14px;
        }
        .compose-modal__results {
            flex: 1;
            overflow-y: auto;
            min-height: 200px;
            max-height: 400px;
        }
        .compose-result {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .compose-result:hover { background: rgba(255,255,255,0.03); }
        .compose-result__avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: #5A6480; font-size: 14px; font-weight: 600;
            flex-shrink: 0;
        }
        .compose-result__main { flex: 1; min-width: 0; }
        .compose-result__name { color: #FFFFFF; font-weight: 300; font-size: 14px; }
        .compose-result__name strong { font-weight: 700; }
        .compose-result__handle { color: #7E89A6; font-size: 12px; }
        .compose-empty { padding: 30px 20px; text-align: center; color: #7E89A6; font-size: 13px; }

        .msg__bubble--pending { opacity: 0.6; }
        .msg__bubble--failed { background: rgba(255,107,107,0.18) !important; border-color: rgba(255,107,107,0.4) !important; }
    </style>
</head>
<body class="app-body">

    <div data-app-shell data-page-title="Inbox"></div>

    <main class="app-main"><div class="inbox-page">
        <div class="inbox-grid">
            <section class="inbox-card inbox-list" id="inboxList" data-help="Conversations list — every direct message thread you're part of. Unread threads show a blue dot. Click one to open it on the right.">
                <div class="inbox-card__head">
                    <span>Conversations</span>
                    <button type="button" class="inbox-compose-btn" id="composeBtn" data-help="Start a new conversation by searching for a member.">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                        New
                    </button>
                </div>
                <div class="inbox-list__items" id="conversationsList">
                    <div class="inbox-empty">Loading…</div>
                </div>
            </section>

            <section class="inbox-card inbox-thread" id="inboxThread" data-help="Message thread — full history with the selected member. Opening a thread marks new messages as read for you.">
                <div class="inbox-card__head">
                    <button type="button" class="inbox-back" id="inboxBack" data-help="Back to the conversations list (mobile only).">← Back</button>
                    <span id="threadTitle">Choose a conversation</span>
                </div>
                <div class="inbox-thread__messages" id="threadMessages">
                    <div class="inbox-placeholder">Pick a conversation on the left, or send your first message from someone's <strong>profile</strong>.</div>
                </div>
                <form id="composerForm" class="inbox-thread__composer" hidden>
                    <input type="text" class="inbox-thread__input" id="composerInput" placeholder="Type a message…" maxlength="50000" autocomplete="off" data-help="Message text — up to 50.000 characters. Press Enter or click Send to deliver. The recipient gets a notification.">
                    <button type="button" class="emoji-trigger" id="composerEmojiBtn" aria-label="Insert emoji" data-help="Open emoji picker to insert an emoji into your message at the cursor.">😊</button>
                    <button type="submit" class="inbox-thread__send" id="composerSend" disabled data-help="Send the message. The recipient is notified instantly and the thread bumps to the top of their inbox.">Send</button>
                </form>
            </section>
        </div>
    </div></main>

    <div class="compose-overlay" id="composeOverlay" role="dialog" aria-modal="true" aria-labelledby="composeTitle">
        <div class="compose-modal">
            <div class="compose-modal__head">
                <span class="compose-modal__title" id="composeTitle">New message</span>
                <button type="button" class="compose-modal__close" id="composeClose" aria-label="Close">×</button>
            </div>
            <div class="compose-modal__search">
                <input type="text" class="compose-modal__input" id="composeSearch" placeholder="Search by name or @username…" autocomplete="off" data-help="Type to filter members. Click one to start the conversation.">
            </div>
            <div class="compose-modal__results" id="composeResults">
                <div class="compose-empty">Loading members…</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/format.js"></script>
    <script src="../js/app-shell.js"></script>
    <script src="../js/emoji-picker.js"></script>
    <script src="../js/inbox.js"></script>
</body>
</html>
