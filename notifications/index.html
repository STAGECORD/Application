<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>STAGECORD — Notifications</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/logo.css">
    <link rel="stylesheet" href="../css/start.css">
    <link rel="stylesheet" href="../css/app-shell.css">
    <style>
        .notif-wrap { max-width: 720px; margin: 0 auto; padding: 32px 24px 60px; }
        .notif-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
        .notif-head h1 { margin: 0; color: #FFFFFF; font-size: 26px; font-weight: 600; }
        .notif-mark-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #FFFFFF;
            border-radius: 999px; padding: 8px 16px;
            font-size: 13px; cursor: pointer; font-family: inherit;
        }
        .notif-mark-btn:hover { background: rgba(255,255,255,0.05); }
        .notif-list { display: flex; flex-direction: column; gap: 10px; }
        .notif-empty { padding: 50px 20px; text-align: center; color: #7E89A6; }

        .notif {
            display: flex; gap: 12px; align-items: flex-start;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 14px 16px;
            text-decoration: none; color: inherit;
            transition: border-color 0.15s ease;
        }
        .notif:hover { border-color: rgba(255,255,255,0.16); }
        .notif--unread { border-color: rgba(56,134,252,0.32); background: rgba(56,134,252,0.06); }
        .notif__avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: #5A6480; font-size: 15px; font-weight: 600;
            flex-shrink: 0;
        }
        .notif__body { flex: 1; min-width: 0; }
        .notif__text {
            color: #D1D6E0; font-size: 14px; line-height: 1.4;
            margin: 0;
        }
        .notif__text strong { color: #FFFFFF; font-weight: 700; }
        .notif__time { color: #5A6480; font-size: 12px; margin-top: 4px; }
        .notif__dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #FF6B6B;
            margin-top: 8px; flex-shrink: 0;
            opacity: 0;
        }
        .notif--unread .notif__dot { opacity: 1; }
    </style>
</head>
<body class="app-body">

    <div data-app-shell data-page-title="Notifications"></div>

    <main class="app-main"><div class="notif-wrap">
        <div class="notif-head">
            <h1>Notifications</h1>
            <button class="notif-mark-btn" id="markAllBtn" hidden>Mark all read</button>
        </div>

        <div class="notif-list" id="notifList">
            <div class="notif-empty">Loading…</div>
        </div>
    </div></main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/format.js"></script>
    <script src="../js/app-shell.js"></script>
    <script>
    (async function () {
        const sb = window.supabaseClient;

        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
            window.location.href = '/login/';
            return;
        }

        const signOutBtn = document.getElementById('signOutBtn');
        if (signOutBtn) {
            signOutBtn.addEventListener('click', async () => {
                await sb.auth.signOut();
                window.location.href = '/';
            });
        }

        const listEl = document.getElementById('notifList');
        const markAllBtn = document.getElementById('markAllBtn');

        function escapeHtml(s) {
            return String(s).replace(/[<>&"']/g, (c) => ({
                '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        function timeAgo(iso) {
            const t = new Date(iso).getTime();
            const diff = (Date.now() - t) / 1000;
            if (diff < 60) return 'just now';
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
            return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function notifVerb(type) {
            switch (type) {
                case 'follow': return 'started following you';
                case 'like_post': return 'liked your post';
                case 'like_track': return 'liked your track';
                case 'comment': return 'commented on your post';
                case 'reply': return 'replied to your comment';
                case 'message': return 'sent you a message';
                default: return type;
            }
        }

        function notifLink(n) {
            switch (n.type) {
                case 'follow':
                case 'like_post':
                case 'like_track':
                case 'comment':
                case 'reply':
                    return n.actor_username ? `/u/${encodeURIComponent(n.actor_username)}` : '/welcome/';
                case 'message':
                    return n.target_id ? `/inbox/?c=${encodeURIComponent(n.target_id)}` : '/inbox/';
                default:
                    return '#';
            }
        }

        const { data: rows, error } = await sb.rpc('get_my_notifications', { p_limit: 100 });

        if (error) {
            console.error('get_my_notifications failed:', error);
            listEl.innerHTML = `<div class="notif-empty">Couldn't load notifications: ${escapeHtml(error.message || '')}</div>`;
            return;
        }

        if (!rows || rows.length === 0) {
            listEl.innerHTML = `<div class="notif-empty">No notifications yet. Follows, likes, comments and messages will land here.</div>`;
            return;
        }

        const hasUnread = rows.some((n) => !n.read_at);
        if (hasUnread) markAllBtn.hidden = false;

        listEl.innerHTML = rows.map((n) => {
            const F = window.STAGECORD;
            const plainName = F ? F.plainName(n.actor_forename, n.actor_surname, n.actor_username || 'Someone') : ([n.actor_forename, n.actor_surname].filter(Boolean).join(' ') || n.actor_username || 'Someone');
            // Bold forename + light surname for the actor, then the verb in normal weight.
            const styledName = F ? F.formatName(n.actor_forename, n.actor_surname, n.actor_username || 'Someone') : `<strong>${escapeHtml(plainName)}</strong>`;
            const initial = (plainName[0] || '?').toUpperCase();
            const avatarHtml = n.actor_avatar_url
                ? `<div class="notif__avatar" style="background-image:url('${escapeHtml(n.actor_avatar_url)}');"></div>`
                : `<div class="notif__avatar">${escapeHtml(initial)}</div>`;
            return `<a class="notif${!n.read_at ? ' notif--unread' : ''}" href="${escapeHtml(notifLink(n))}">
                ${avatarHtml}
                <div class="notif__body">
                    <p class="notif__text">${styledName} ${escapeHtml(notifVerb(n.type))}.</p>
                    <div class="notif__time">${escapeHtml(timeAgo(n.created_at))}</div>
                </div>
                <span class="notif__dot"></span>
            </a>`;
        }).join('');

        markAllBtn.addEventListener('click', async () => {
            markAllBtn.disabled = true;
            markAllBtn.textContent = 'Marking…';
            const { error } = await sb.rpc('mark_notifications_read');
            markAllBtn.disabled = false;
            if (error) {
                console.error(error);
                markAllBtn.textContent = 'Mark all read';
                return;
            }
            listEl.querySelectorAll('.notif--unread').forEach((el) => el.classList.remove('notif--unread'));
            markAllBtn.hidden = true;
        });

        // Auto-mark all as read on visit (so the bell clears)
        sb.rpc('mark_notifications_read').catch(() => {});
    })();
    </script>
</body>
</html>
