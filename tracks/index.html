<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>STAGECORD — Your tracks</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/logo.css">
    <link rel="stylesheet" href="../css/start.css">
    <link rel="stylesheet" href="../css/app-shell.css">
    <style>
        .tracks-wrap { max-width: 720px; margin: 0 auto; padding: 32px 24px 60px; }
        .tracks-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .tracks-card h2 { margin: 0 0 14px 0; color: #FFFFFF; font-weight: 600; font-size: 18px; }
        .tracks-card h2 .tracks-card__sub { color: #7E89A6; font-size: 13px; font-weight: 400; margin-left: 8px; }

        .upload-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .upload-field label {
            font-size: 12px; color: #7E89A6;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .upload-field input[type="text"], .upload-field textarea {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; padding: 10px 14px; color: #FFFFFF;
            font-family: inherit; font-size: 15px;
            width: 100%; box-sizing: border-box;
        }
        .upload-field textarea { min-height: 70px; resize: vertical; }
        .upload-file-row {
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
            margin-top: 4px;
        }
        .upload-file-btn {
            display: inline-flex; align-items: center; gap: 8px;
            color: #FFFFFF; cursor: pointer;
            padding: 8px 14px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(0,0,0,0.2);
            font-size: 13px;
        }
        .upload-file-btn:hover { border-color: rgba(255,255,255,0.24); }
        .upload-file-name { color: #D1D6E0; font-size: 13px; }
        .upload-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 14px; }
        .upload-btn {
            background: #FFFFFF; color: #0B0B0F; border: none;
            border-radius: 999px; padding: 10px 22px;
            font-weight: 600; cursor: pointer; font-size: 14px;
        }
        .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .upload-feedback { font-size: 13px; min-height: 16px; }
        .upload-feedback.is-success { color: #5CD66B; }
        .upload-feedback.is-error { color: #FF6B6B; }
        .upload-progress {
            font-size: 13px; color: #7E89A6;
        }

        .track {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
        }
        .track__head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .track__title { margin: 0; color: #FFFFFF; font-size: 15px; font-weight: 600; flex: 1; min-width: 0; }
        .track__time { color: #5A6480; font-size: 12px; }
        .track__delete {
            background: transparent; border: none; color: #5A6480;
            cursor: pointer; font-size: 16px; padding: 4px 8px;
        }
        .track__delete:hover { color: #FF6B6B; }
        .track__desc {
            margin: 0 0 10px 0; color: #D1D6E0;
            font-size: 14px; line-height: 1.5;
            white-space: pre-wrap;
        }
        .track audio {
            width: 100%; margin-top: 4px;
            filter: invert(0.85) hue-rotate(180deg);
        }
        .tracks-empty { text-align: center; padding: 24px 20px; color: #7E89A6; font-size: 14px; }
        .like-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: transparent; border: none;
            color: #7E89A6; cursor: pointer;
            padding: 6px 10px; border-radius: 999px;
            font-family: inherit; font-size: 13px;
            transition: color 0.15s ease, background 0.15s ease;
        }
        .like-btn:hover { background: rgba(255,255,255,0.05); color: #FFFFFF; }
        .like-btn--active { color: #FF6B6B; }
        .like-btn--active:hover { color: #FF6B6B; background: rgba(255,107,107,0.08); }
        .like-btn__icon { display: inline-flex; }
        .like-btn__label { color: inherit; opacity: 0.85; }
        .track__actions { display: flex; align-items: center; gap: 4px; margin-top: 10px; }
    </style>
</head>
<body class="app-body">

    <div data-app-shell data-page-title="Tracks"></div>

    <main class="app-main"><div class="tracks-wrap">
        <div class="tracks-card" data-help="Upload a new track — title, optional description and the audio file. Once published it shows up on your public profile and is available to add to projects + playlists.">
            <h2>Upload a track <span class="tracks-card__sub">MP3, WAV, M4A or OGG · max 50 MB</span></h2>

            <form id="uploadForm">
                <div class="upload-field">
                    <label for="track-title">Title</label>
                    <input id="track-title" type="text" maxlength="200" placeholder="What do you call this track?" required data-help="Track title — shown wherever the track appears (your profile, playlists, project rails). Up to 200 characters.">
                </div>

                <div class="upload-field">
                    <label for="track-desc">Description <span style="opacity:0.6;">(optional)</span></label>
                    <textarea id="track-desc" maxlength="1000" placeholder="A short note about the track — when it's from, what it's about, who you made it with." data-help="Optional context for the track — what it's about, who you made it with, when it was recorded. Shown beneath the player."></textarea>
                </div>

                <div class="upload-field">
                    <label>Audio file</label>
                    <div class="upload-file-row">
                        <label class="upload-file-btn" data-help="Pick an audio file (MP3, WAV, M4A or OGG, up to 50 MB). Duration is detected automatically and shown on the player.">
                            <input type="file" id="track-file" accept="audio/mpeg,audio/wav,audio/mp4,audio/m4a,audio/aac,audio/ogg,audio/x-m4a,audio/mp3" hidden>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M9 18V5l12-2v13"/>
                                <circle cx="6" cy="18" r="3"/>
                                <circle cx="18" cy="16" r="3"/>
                            </svg>
                            <span>Choose file</span>
                        </label>
                        <span class="upload-file-name" id="trackFileName">No file chosen</span>
                    </div>
                </div>

                <div class="upload-row">
                    <button type="submit" class="upload-btn" id="uploadBtn" disabled data-help="Publish the track. The file uploads to STAGECORD storage and the track appears in your list below and on your public profile.">Publish track</button>
                    <span class="upload-progress" id="uploadProgress"></span>
                    <span class="upload-feedback" id="uploadFeedback" role="status" aria-live="polite"></span>
                </div>
            </form>
        </div>

        <div class="tracks-card" data-help="Your published tracks. Each row plays inline, supports likes and can be deleted by you. The × button on a track removes both the file and its plays.">
            <h2>Your tracks <span class="tracks-card__sub" id="tracksCount"></span></h2>
            <div id="tracksList">
                <div class="tracks-empty">Loading…</div>
            </div>
        </div>
    </div></main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/format.js"></script>
    <script src="../js/app-shell.js"></script>
    <script src="../js/likes.js"></script>
    <script src="../js/add-to-playlist.js"></script>
    <script src="../js/add-to-project.js"></script>
    <script src="../js/tracks.js"></script>
</body>
</html>
