<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAGECORD - Search</title>
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/logo.css">
    <link rel="stylesheet" href="../css/topbar.css">
    <link rel="stylesheet" href="../css/search.css">
</head>
<body>
    <aside class="sidebar" data-sidebar></aside>

    <header class="topbar">
        <div class="logo-container"><a href="../index.html" class="logo-link"><h1 class="logo"><span class="logo-stage">STAGE</span><span class="logo-cord">CORD</span></h1></a></div>
        <div class="search-bar">
            <input type="text" class="search-input" placeholder="Search Artists, Concerts, Venues, Friends and much more" aria-label="Search"/>
            <svg class="search-icon" viewBox="0 0 28 28" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"/><path d="M18 18L24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <button type="button" class="help-button" aria-label="Help" aria-pressed="false" data-help="Help button: Click to enter help mode, then click any element with a help-cursor to see what it does. Press Esc or click the help button again to exit."><span class="help-mark">?</span></button>
    </header>

    <main class="main-content">
        <div class="content-wrapper" data-search-results>

            <header class="search-page-header">
                <h1 class="search-page-header__heading" data-search-heading>Search</h1>
                <p class="search-page-header__subtitle"><span data-search-count>0 results</span> · across artists, songs, albums, playlists, fans, venues</p>
            </header>

            <div class="search-page-chips" data-search-chips></div>

            <div class="search-page-results" data-search-list></div>

        </div>
    </main>

    <script src="../js/core.js"></script>
    <script src="../js/modes.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/topbar-widgets.js"></script>
    <script src="../js/stage-badge.js"></script>
    <script src="../js/acting-as-service.js"></script>
    <script src="../js/stage-cards.js"></script>
    <script src="../js/stage-label.js"></script>
    <script src="../js/stage-resources.js"></script>
    <script src="../js/stage-economy.js"></script>
    <script src="../js/settings.js"></script>
    <script src="../js/activity-feed.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
