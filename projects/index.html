<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>STAGECORD — Projects</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/logo.css">
    <link rel="stylesheet" href="../css/start.css">
    <link rel="stylesheet" href="../css/app-shell.css">
    <style>
        .pj-wrap { max-width: 880px; margin: 0 auto; padding: 32px 24px 60px; }
        .pj-head {
            display: flex; align-items: baseline; gap: 16px;
            margin-bottom: 24px; flex-wrap: wrap;
        }
        .pj-head h1 { margin: 0; color: #FFFFFF; font-size: 26px; font-weight: 600; flex: 1; }
        .pj-btn {
            background: #FFFFFF; color: #0B0B0F; border: none;
            border-radius: 999px; padding: 9px 18px;
            font-weight: 600; cursor: pointer; font-size: 13px;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
            font-family: inherit;
        }
        .pj-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pj-btn--ghost { background: transparent; color: #FFFFFF; border: 1px solid rgba(255,255,255,0.2); }
        .pj-btn--danger:hover { background: rgba(255,107,107,0.12); border-color: rgba(255,107,107,0.6); color: #FF6B6B; }

        .pj-empty {
            background: rgba(255,255,255,0.02);
            border: 1px dashed rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 50px 20px; text-align: center;
            color: #7E89A6; font-size: 14px;
        }

        .pj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
        .pj-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 18px;
            display: flex; flex-direction: column; gap: 8px;
            text-decoration: none; color: inherit;
            transition: border-color 0.15s ease, transform 0.15s ease;
        }
        .pj-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
        .pj-card__head { display: flex; align-items: center; gap: 8px; }
        .pj-card__name { color: #FFFFFF; font-weight: 600; font-size: 16px; line-height: 1.3; flex: 1; min-width: 0; }
        .pj-status {
            display: inline-block; padding: 2px 9px; border-radius: 999px;
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
        }
        .pj-status--in_progress { background: rgba(56,134,252,0.18); color: #6FA8FF; }
        .pj-status--released { background: rgba(92,214,107,0.18); color: #5CD66B; }
        .pj-status--archived { background: rgba(255,255,255,0.08); color: #7E89A6; }
        .pj-card__meta { color: #7E89A6; font-size: 13px; }
        .pj-card__desc { color: #D1D6E0; font-size: 13px; line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .pj-detail__head {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 18px;
        }
        .pj-detail__title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
        .pj-detail__title { margin: 0; color: #FFFFFF; font-size: 26px; font-weight: 600; line-height: 1.2; }
        .pj-detail__meta { color: #7E89A6; font-size: 14px; margin-bottom: 12px; }
        .pj-detail__meta a { color: #FFFFFF; text-decoration: none; }
        .pj-detail__meta a:hover { text-decoration: underline; }
        .pj-detail__meta strong { font-weight: 700; }
        .pj-detail__desc {
            color: #D1D6E0; font-size: 14px; line-height: 1.6;
            white-space: pre-wrap; margin: 12px 0 0 0;
        }
        .pj-detail__actions { display: flex; gap: 10px; margin: 0 0 14px 0; flex-wrap: wrap; }

        .pj-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 14px;
        }
        .pj-section h2 { margin: 0 0 12px 0; color: #FFFFFF; font-weight: 600; font-size: 15px;
            display: flex; align-items: baseline; gap: 8px; }
        .pj-section h2 .count { color: #7E89A6; font-size: 13px; font-weight: 400; }

        .pj-members { display: flex; flex-wrap: wrap; gap: 10px; }
        .pj-member {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 999px;
            padding: 6px 12px 6px 6px;
            text-decoration: none; color: inherit;
            font-size: 13px;
        }
        .pj-member__avatar {
            width: 26px; height: 26px; border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: #5A6480; font-size: 11px; font-weight: 600;
            flex-shrink: 0;
        }
        .pj-member__name { color: #FFFFFF; font-weight: 300; }
        .pj-member__name strong { font-weight: 700; }
        .pj-member__crown { color: #FFD75A; font-size: 12px; }
        .pj-member__remove {
            background: transparent; border: none; color: #5A6480;
            cursor: pointer; font-size: 14px; padding: 0 4px; margin-left: 4px;
            font-family: inherit;
        }
        .pj-member__remove:hover { color: #FF6B6B; }

        .pj-invite-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .pj-invite-row input {
            flex: 1; min-width: 180px;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px; padding: 8px 14px; color: #FFFFFF;
            font-family: inherit; font-size: 13px;
        }
        .pj-invite-feedback { font-size: 12px; min-height: 14px; color: #7E89A6; margin-top: 6px; }
        .pj-invite-feedback.is-error { color: #FF6B6B; }
        .pj-invite-feedback.is-success { color: #5CD66B; }

        .pj-track {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
        }
        .pj-track__head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .pj-track__title { margin: 0; color: #FFFFFF; font-weight: 600; font-size: 15px; flex: 1; min-width: 0; }
        .pj-track__artist { color: #7E89A6; font-size: 13px; font-weight: 300; }
        .pj-track__artist strong { font-weight: 700; }
        .pj-track__artist a { color: inherit; text-decoration: none; }
        .pj-track__artist a:hover { color: #FFFFFF; }
        .pj-track__remove {
            background: transparent; border: none; color: #5A6480;
            cursor: pointer; font-size: 16px; padding: 4px 8px; font-family: inherit;
        }
        .pj-track__remove:hover { color: #FF6B6B; }
        .pj-track audio { width: 100%; margin-top: 4px; filter: invert(0.85) hue-rotate(180deg); }

        .pj-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(2, 4, 12, 0.72);
            display: none; align-items: center; justify-content: center;
            z-index: 200; padding: 20px;
        }
        .pj-modal-overlay.is-open { display: flex; }
        .pj-modal {
            width: 100%; max-width: 460px;
            background: #0B1A38; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 24px;
        }
        .pj-modal h2 { margin: 0 0 14px 0; color: #FFFFFF; font-size: 18px; font-weight: 600; }
        .pj-modal-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .pj-modal-field label {
            font-size: 12px; color: #7E89A6;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .pj-modal-field input, .pj-modal-field textarea {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; padding: 10px 14px; color: #FFFFFF;
            font-family: inherit; font-size: 14px;
            width: 100%; box-sizing: border-box;
        }
        .pj-modal-field textarea { min-height: 80px; resize: vertical; }
        .pj-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .pj-modal-error { color: #FF6B6B; font-size: 13px; min-height: 18px; margin-bottom: 6px; }

        .pj-cover-area {
            position: relative;
            width: 100%; height: 180px;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            background-size: cover; background-position: center;
            margin-bottom: 18px;
            cursor: pointer;
            overflow: hidden;
        }
        .pj-cover-area__placeholder {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #5A6480; font-size: 13px;
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .pj-cover-area__overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.55);
            display: none; align-items: center; justify-content: center;
            color: #FFFFFF; font-size: 14px;
        }
        .pj-cover-area:hover .pj-cover-area__overlay { display: flex; }
        .pj-cover-area input { display: none; }
        .pj-cover-area--readonly { cursor: default; }
        .pj-cover-area--readonly:hover .pj-cover-area__overlay { display: none; }

        .pj-status-select {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; padding: 10px 14px; color: #FFFFFF;
            font-family: inherit; font-size: 14px;
            width: 100%; box-sizing: border-box;
        }
        .pj-status-select option { background: #0B1A38; }

        /* ---------- Rich project card (matches the original prototype) ---------- */
        .project-card-rich {
            background: #000000;
            border: 1px solid #797979;
            border-radius: 22px;
            padding: 22px 26px 24px;
            margin-bottom: 18px;
            color: #FFFFFF;
        }
        .pc-header { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; }
        .pc-name {
            margin: 0; color: #FFFFFF; font-size: 22px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.2;
        }
        .pc-meta { color: #B1B1B1; font-size: 13px; margin-bottom: 10px; }
        .pc-meta a { color: #FFFFFF; text-decoration: none; }
        .pc-meta a:hover { text-decoration: underline; }
        .pc-meta strong { font-weight: 700; }
        .pc-desc {
            color: #D1D6E0; font-size: 14px; line-height: 1.55;
            white-space: pre-wrap; margin: 0 0 18px 0;
        }

        /* Collaborator row */
        .collab-row {
            display: flex; flex-wrap: nowrap; gap: 14px;
            overflow-x: auto; overflow-y: hidden;
            padding-bottom: 10px; margin-bottom: 8px;
            scroll-snap-type: x proximity;
            -webkit-overflow-scrolling: touch;
        }
        .collab-row::-webkit-scrollbar { height: 6px; }
        .collab-row::-webkit-scrollbar-track { background: transparent; }
        .collab-row::-webkit-scrollbar-thumb { background: #797979; border-radius: 3px; }

        .collab-card {
            flex: 0 0 100px; width: 100px;
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: inherit;
            scroll-snap-align: start;
            position: relative;
            background: transparent; border: none;
            padding: 0; font-family: inherit; cursor: pointer;
            transition: transform 0.15s ease;
        }
        a.collab-card:hover, button.collab-card:hover { transform: translateY(-2px); }
        a.collab-card:hover .collab-card__avatar { box-shadow: 0 0 0 2px #FFFFFF; }
        .collab-card__role {
            font-weight: 700; font-size: 11px; line-height: 14px;
            text-transform: uppercase; color: #FFFFFF;
            text-align: center; padding: 0 2px;
            min-height: 28px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 8px;
            white-space: nowrap;
            max-width: 100px;
            overflow: hidden; text-overflow: ellipsis;
        }
        .collab-card__avatar {
            width: 64px; height: 64px; border-radius: 50%;
            background: #333; background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: #FFFFFF; font-weight: 700; font-size: 22px;
            transition: box-shadow 0.15s ease;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .collab-card__name {
            font-size: 12px; line-height: 15px; text-align: center;
            text-transform: uppercase; color: #FFFFFF;
        }
        .collab-card__name strong { font-weight: 700; display: block; }
        .collab-card__name-rest { font-weight: 400; display: block; }
        .collab-card__crown {
            position: absolute; top: 26px; right: 10px;
            color: #FFD75A; font-size: 13px; line-height: 1;
            text-shadow: 0 0 4px rgba(0,0,0,0.7);
        }
        .collab-card--add .collab-card__avatar {
            background: #000000; border: 1px solid #FFFFFF;
            font-size: 38px; font-weight: 400;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        .collab-card--add:hover .collab-card__avatar {
            background: #1a1a1a; transform: scale(1.03);
        }
        .collab-card__remove {
            position: absolute; top: 22px; left: 8px;
            background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.3);
            color: #FFFFFF; border-radius: 50%;
            width: 20px; height: 20px;
            font-size: 14px; line-height: 1;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; padding: 0;
            font-family: inherit;
        }
        .collab-card:hover .collab-card__remove { display: flex; }
        .collab-card__remove:hover { background: #FF6B6B; border-color: #FF6B6B; }

        /* Action sections grid */
        .action-sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 24px;
            margin: 6px 0 22px 0;
        }
        .action-section h4 {
            margin: 0 0 12px 0;
            font-weight: 700; font-size: 13px;
            text-transform: uppercase; letter-spacing: 0.04em;
            color: #FFFFFF;
        }
        .action-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
        .action-btn {
            background: transparent;
            border: 1px solid #797979;
            border-radius: 999px;
            height: 28px;
            min-width: 92px;
            padding: 0 14px;
            font-family: inherit;
            font-size: 12px;
            color: #FFFFFF;
            cursor: pointer;
            transition: border-color 0.15s ease, background 0.15s ease;
        }
        .action-btn:hover { border-color: #FFFFFF; background: rgba(255,255,255,0.04); }
        .action-btn--active { border-color: #FFFFFF; background: rgba(255,255,255,0.08); }

        .royalties-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .royalty-column {
            display: flex; flex-direction: column; gap: 8px;
            flex: 1 1 92px; min-width: 92px;
        }
        .royalty-column .action-btn { width: 100%; min-width: 0; }

        .approval-list { display: flex; flex-direction: column; gap: 6px; }
        .approval-row {
            display: flex; align-items: center; gap: 10px;
            height: 28px; padding: 0 4px;
            border: 1px solid transparent;
            border-radius: 6px;
            font-size: 12px; color: #FFFFFF;
        }
        .approval-row__name {
            flex: 1; min-width: 0;
            text-transform: uppercase;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .approval-row__name strong { font-weight: 700; }
        .approval-status {
            width: 20px; height: 20px; flex-shrink: 0; border-radius: 50%;
            background-color: #555;
            background-position: center; background-repeat: no-repeat; background-size: 12px;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round'><path d='M12 7v5l3 2'/></svg>");
        }
        .approval-row.is-approved .approval-status {
            background-color: #00A911;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='5 12 10 17 19 7'/></svg>");
        }

        .pc-tracks { margin-top: 6px; }
        .pc-tracks h4 {
            margin: 0 0 12px 0; font-weight: 700; font-size: 13px;
            text-transform: uppercase; letter-spacing: 0.04em; color: #FFFFFF;
        }

        .pc-invite-row { display: flex; gap: 8px; margin: 10px 0 18px 0; flex-wrap: wrap; }
        .pc-invite-row input {
            flex: 1; min-width: 180px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 999px; padding: 8px 14px; color: #FFFFFF;
            font-family: inherit; font-size: 13px;
        }
        .pc-invite-feedback { font-size: 12px; min-height: 14px; color: #B1B1B1; margin: -8px 0 14px 4px; }
        .pc-invite-feedback.is-error { color: #FF6B6B; }
        .pc-invite-feedback.is-success { color: #5CD66B; }
    </style>
</head>
<body class="app-body">

    <div data-app-shell data-page-title="Projects"></div>

    <main class="app-main"><div class="pj-wrap">
        <div id="pjContent">
            <div class="pj-empty">Loading…</div>
        </div>
    </div></main>

    <div class="pj-modal-overlay" id="pjModal">
        <div class="pj-modal">
            <h2 id="pjModalTitle">New project</h2>
            <form id="pjModalForm">
                <div class="pj-modal-field">
                    <label for="pj-title">Title</label>
                    <input id="pj-title" type="text" maxlength="200" placeholder="e.g. Summer EP" required>
                </div>
                <div class="pj-modal-field">
                    <label for="pj-desc">Description <span style="opacity:0.6;">(optional)</span></label>
                    <textarea id="pj-desc" maxlength="2000" placeholder="What is this project about? Who's involved? When are you releasing it?"></textarea>
                </div>
                <div class="pj-modal-field" id="pjStatusField" style="display:none;">
                    <label for="pj-status-input">Status</label>
                    <select id="pj-status-input" class="pj-status-select">
                        <option value="in_progress">In progress</option>
                        <option value="released">Released</option>
                        <option value="archived">Archived</option>
                    </select>
                </div>
                <div class="pj-modal-error" id="pjModalError"></div>
                <div class="pj-modal-actions">
                    <button type="button" class="pj-btn pj-btn--ghost" id="pjModalCancel">Cancel</button>
                    <button type="submit" class="pj-btn" id="pjModalSubmit">Create</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/format.js"></script>
    <script src="../js/app-shell.js"></script>
    <script src="../js/projects.js"></script>
</body>
</html>
