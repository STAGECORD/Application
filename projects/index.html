<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>STAGECORD — Projects</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/logo.css">
    <link rel="stylesheet" href="../css/start.css">
    <link rel="stylesheet" href="../css/app-shell.css">
    <style>
        .pj-wrap { max-width: 1400px; margin: 0 auto; padding: 32px 24px 60px; }
        .pj-rich-list { display: flex; flex-direction: column; gap: 24px; }
        .pj-rich-host { display: block; }
        .pj-head {
            display: flex; align-items: baseline; gap: 16px;
            margin-bottom: 24px; flex-wrap: wrap;
        }
        .pj-head h1 { margin: 0; color: #FFFFFF; font-size: 26px; font-weight: 600; flex: 1; }
        .pj-btn {
            background: #FFFFFF; color: #0B0B0F; border: none;
            border-radius: 999px; padding: 9px 18px;
            font-weight: 600; cursor: pointer; font-size: 13px;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
            font-family: inherit;
        }
        .pj-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pj-btn--ghost { background: transparent; color: #FFFFFF; border: 1px solid rgba(255,255,255,0.2); }
        .pj-btn--danger:hover { background: rgba(255,107,107,0.12); border-color: rgba(255,107,107,0.6); color: #FF6B6B; }

        .pj-empty {
            background: rgba(255,255,255,0.02);
            border: 1px dashed rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 50px 20px; text-align: center;
            color: #7E89A6; font-size: 14px;
        }

        .pj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
        .pj-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 18px;
            display: flex; flex-direction: column; gap: 8px;
            text-decoration: none; color: inherit;
            transition: border-color 0.15s ease, transform 0.15s ease;
        }
        .pj-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
        .pj-card__head { display: flex; align-items: center; gap: 8px; }
        .pj-card__name { color: #FFFFFF; font-weight: 600; font-size: 16px; line-height: 1.3; flex: 1; min-width: 0; }
        .pj-status {
            display: inline-block; padding: 2px 9px; border-radius: 999px;
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
        }
        .pj-status--in_progress { background: rgba(56,134,252,0.18); color: #6FA8FF; }
        .pj-status--released { background: rgba(92,214,107,0.18); color: #5CD66B; }
        .pj-status--archived { background: rgba(255,255,255,0.08); color: #7E89A6; }
        .pj-card__meta { color: #7E89A6; font-size: 13px; }
        .pj-card__desc { color: #D1D6E0; font-size: 13px; line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .pj-detail__head {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 18px;
        }
        .pj-detail__title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
        .pj-detail__title { margin: 0; color: #FFFFFF; font-size: 26px; font-weight: 600; line-height: 1.2; }
        .pj-detail__meta { color: #7E89A6; font-size: 14px; margin-bottom: 12px; }
        .pj-detail__meta a { color: #FFFFFF; text-decoration: none; }
        .pj-detail__meta a:hover { text-decoration: underline; }
        .pj-detail__meta strong { font-weight: 700; }
        .pj-detail__desc {
            color: #D1D6E0; font-size: 14px; line-height: 1.6;
            white-space: pre-wrap; margin: 12px 0 0 0;
        }
        .pj-detail__actions { display: flex; gap: 10px; margin: 0 0 14px 0; flex-wrap: wrap; }

        .pj-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 14px;
        }
        .pj-section h2 { margin: 0 0 12px 0; color: #FFFFFF; font-weight: 600; font-size: 15px;
            display: flex; align-items: baseline; gap: 8px; }
        .pj-section h2 .count { color: #7E89A6; font-size: 13px; font-weight: 400; }

        .pj-members { display: flex; flex-wrap: wrap; gap: 10px; }
        .pj-member {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 999px;
            padding: 6px 12px 6px 6px;
            text-decoration: none; color: inherit;
            font-size: 13px;
        }
        .pj-member__avatar {
            width: 26px; height: 26px; border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: #5A6480; font-size: 11px; font-weight: 600;
            flex-shrink: 0;
        }
        .pj-member__name { color: #FFFFFF; font-weight: 300; }
        .pj-member__name strong { font-weight: 700; }
        .pj-member__crown { color: #FFD75A; font-size: 12px; }
        .pj-member__remove {
            background: transparent; border: none; color: #5A6480;
            cursor: pointer; font-size: 14px; padding: 0 4px; margin-left: 4px;
            font-family: inherit;
        }
        .pj-member__remove:hover { color: #FF6B6B; }

        .pj-invite-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .pj-invite-row input {
            flex: 1; min-width: 180px;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px; padding: 8px 14px; color: #FFFFFF;
            font-family: inherit; font-size: 13px;
        }
        .pj-invite-feedback { font-size: 12px; min-height: 14px; color: #7E89A6; margin-top: 6px; }
        .pj-invite-feedback.is-error { color: #FF6B6B; }
        .pj-invite-feedback.is-success { color: #5CD66B; }

        .pj-track {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
        }
        .pj-track__head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .pj-track__title { margin: 0; color: #FFFFFF; font-weight: 600; font-size: 15px; flex: 1; min-width: 0; }
        .pj-track__artist { color: #7E89A6; font-size: 13px; font-weight: 300; }
        .pj-track__artist strong { font-weight: 700; }
        .pj-track__artist a { color: inherit; text-decoration: none; }
        .pj-track__artist a:hover { color: #FFFFFF; }
        .pj-track__remove {
            background: transparent; border: none; color: #5A6480;
            cursor: pointer; font-size: 16px; padding: 4px 8px; font-family: inherit;
        }
        .pj-track__remove:hover { color: #FF6B6B; }
        .pj-track audio { width: 100%; margin-top: 4px; filter: invert(0.85) hue-rotate(180deg); }

        .pj-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(2, 4, 12, 0.72);
            display: none; align-items: center; justify-content: center;
            z-index: 200; padding: 20px;
        }
        .pj-modal-overlay.is-open { display: flex; }
        .pj-modal {
            width: 100%; max-width: 460px;
            background: #0B1A38; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 24px;
        }
        .pj-modal h2 { margin: 0 0 14px 0; color: #FFFFFF; font-size: 18px; font-weight: 600; }
        .pj-modal-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .pj-modal-field label {
            font-size: 12px; color: #7E89A6;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .pj-modal-field input, .pj-modal-field textarea {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; padding: 10px 14px; color: #FFFFFF;
            font-family: inherit; font-size: 14px;
            width: 100%; box-sizing: border-box;
        }
        .pj-modal-field textarea { min-height: 80px; resize: vertical; }
        .pj-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .pj-modal-error { color: #FF6B6B; font-size: 13px; min-height: 18px; margin-bottom: 6px; }

        .pj-cover-area {
            position: relative;
            width: 100%; height: 180px;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            background-size: cover; background-position: center;
            margin-bottom: 18px;
            cursor: pointer;
            overflow: hidden;
        }
        .pj-cover-area__placeholder {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #5A6480; font-size: 13px;
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .pj-cover-area__overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.55);
            display: none; align-items: center; justify-content: center;
            color: #FFFFFF; font-size: 14px;
        }
        .pj-cover-area:hover .pj-cover-area__overlay { display: flex; }
        .pj-cover-area:hover .pj-cover-area__placeholder { display: none; }
        .pj-cover-area input { display: none; }
        .pj-cover-area--readonly { cursor: default; }
        .pj-cover-area--readonly:hover .pj-cover-area__overlay { display: none; }

        .pj-status-select {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; padding: 10px 14px; color: #FFFFFF;
            font-family: inherit; font-size: 14px;
            width: 100%; box-sizing: border-box;
        }
        .pj-status-select option { background: #0B1A38; }

        /* ===== Rich project card — ported from prototype project-card.css ===== */
        :root { --project-gap: 10px; --pill-width: 91px; --pill-height: 27px; }

        .project-card-rich {
            background: #000000;
            border: 1px solid #797979;
            border-radius: 22px;
            padding: 22px 26px 22px;
            margin-bottom: 18px;
            color: #FFFFFF;
            width: 100%;
            container-type: inline-size;
            container-name: projectcard;
        }

        /* Header — project name + status pill on the same row */
        .pc-header {
            display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .pc-name {
            margin: 0;
            font-family: inherit;
            font-size: 14px; line-height: 18px;
            text-transform: uppercase;
            color: #FFFFFF;
            display: inline-flex; align-items: baseline; gap: 6px;
        }
        .pc-name__label { font-weight: 700; }
        .pc-name__value { font-weight: 400; padding: 0 2px; }

        .pc-meta { color: #B1B1B1; font-size: 12px; margin-bottom: 14px; }
        .pc-meta a { color: #FFFFFF; text-decoration: none; }
        .pc-meta a:hover { text-decoration: underline; }
        .pc-meta strong { font-weight: 700; }
        .pc-desc {
            color: #D1D6E0; font-size: 13px; line-height: 1.55;
            white-space: pre-wrap; margin: 16px 0 0 0;
        }

        /* Body: team on the left, action cluster on the right */
        .pc-body { display: flex; gap: 24px; flex-wrap: nowrap; align-items: flex-start; }
        .pc-left {
            display: flex; flex-direction: column;
            flex: 1 1 210px; min-width: 0;
        }
        @container projectcard (min-width: 871px) {
            .pc-left { min-width: 210px; }
        }

        /* Team row — horizontal scroll if too many */
        .project-team {
            display: flex; flex-wrap: nowrap; gap: var(--project-gap);
            overflow-x: auto; overflow-y: hidden;
            padding-bottom: 8px;
            min-width: 0;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x proximity;
        }
        .project-team::-webkit-scrollbar { height: 6px; }
        .project-team::-webkit-scrollbar-track { background: transparent; }
        .project-team::-webkit-scrollbar-thumb { background: #797979; border-radius: 3px; }
        .project-team::-webkit-scrollbar-thumb:hover { background: #AAAAAA; }

        .collaborator-card {
            width: 100px; flex-shrink: 0;
            display: flex; flex-direction: column; align-items: center;
            scroll-snap-align: start;
            text-decoration: none; color: inherit;
            background: transparent; border: none; padding: 0; font-family: inherit;
            transition: transform 0.15s ease;
            position: relative;
            cursor: pointer;
        }
        .collaborator-card:hover { transform: translateY(-2px); }
        .collaborator-card:hover .collaborator-image { box-shadow: 0 0 0 2px #FFFFFF; }

        .collaborator-role {
            font-weight: 700; font-size: 12px; line-height: 15px;
            text-align: center; text-transform: uppercase;
            color: #FFFFFF;
            min-height: 30px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 2px; margin-bottom: 10px;
            max-width: 100px;
            overflow: hidden; text-overflow: ellipsis;
            white-space: normal;
        }
        .collaborator-image {
            width: 64px; height: 64px; border-radius: 50%;
            overflow: hidden; margin-bottom: 10px;
            background: #333;
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: #FFFFFF; flex-shrink: 0;
            transition: box-shadow 0.15s ease;
            font-weight: 700; font-size: 22px;
        }
        .collaborator-name {
            font-size: 12px; line-height: 15px; text-align: center;
            text-transform: uppercase; color: #FFFFFF;
        }
        .collaborator-name__first { font-weight: 700; display: block; }
        .collaborator-name__rest { font-weight: 400; display: block; }

        .collaborator-card.add-person .collaborator-image {
            background: #000000; border: 1px solid #FFFFFF;
            cursor: pointer; font-size: 38px; font-weight: 400;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        .collaborator-card.add-person:hover .collaborator-image {
            background: #1a1a1a; transform: scale(1.03);
        }
        .collaborator-card__crown {
            position: absolute; top: 28px; right: 8px;
            color: #FFD75A; font-size: 13px; line-height: 1;
            text-shadow: 0 0 4px rgba(0,0,0,0.7);
        }
        .collaborator-card__remove {
            position: absolute; top: 24px; left: 8px;
            background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.3);
            color: #FFFFFF; border-radius: 50%;
            width: 20px; height: 20px;
            font-size: 14px; line-height: 1;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; padding: 0;
            font-family: inherit;
        }
        .collaborator-card:hover .collaborator-card__remove { display: flex; }
        .collaborator-card__remove:hover { background: #FF6B6B; border-color: #FF6B6B; }

        /* Action cluster on the right — flex row of button-groups */
        .project-actions {
            display: flex; gap: var(--project-gap);
            flex-wrap: wrap;
            align-items: flex-start;
            flex: 0 0 auto;
            margin-left: auto;
        }
        .button-group {
            display: flex; flex-direction: column;
            align-items: flex-start;
            gap: var(--project-gap);
        }
        .button-group__label {
            font-family: inherit;
            font-weight: 700; font-size: 14px; line-height: 18px;
            text-transform: uppercase; color: #FFFFFF;
        }
        .action-col {
            display: flex; flex-direction: column;
            gap: var(--project-gap);
            flex-shrink: 0;
        }
        .pill-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: var(--pill-width); height: var(--pill-height);
            padding: 0 6px;
            background: #000000;
            border: 1px solid #797979;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 400; font-size: 12px; line-height: 15px;
            text-align: center; color: #FFFFFF;
            cursor: pointer;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }
        .pill-btn:hover { border-color: #FFFFFF; background: #111111; }
        .pill-btn.has-data { border-color: #FFFFFF; }

        /* Royalties: label spans full width, two columns of pills under it */
        .button-group--royalties .button-group__label { width: 100%; }
        .button-group--royalties .royalties-cols {
            display: flex; gap: var(--project-gap);
        }

        /* Approvals — fixed width to align right edge with the release CTA */
        .button-group--approvals { width: 200px; }
        .project-approvals {
            display: flex; flex-direction: column;
            gap: var(--project-gap);
            width: 100%;
        }
        .approval-row {
            display: flex; align-items: center; gap: 8px;
            height: var(--pill-height);
            padding: 0 8px 0 4px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 6px;
            font-family: inherit;
            font-weight: 400; font-size: 12px; line-height: 15px;
            color: #FFFFFF;
            cursor: default;
            text-align: left;
            transition: border-color 0.15s ease, background 0.15s ease;
            width: 100%;
        }
        .approval-row.is-self { cursor: pointer; }
        .approval-row.is-self:hover { border-color: #FFFFFF; background: rgba(255, 255, 255, 0.04); }
        .approval-row__name {
            flex: 1 1 auto; min-width: 0;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            text-transform: uppercase;
        }
        .approval-row__name strong { font-weight: 700; }
        .approval-status {
            width: 20px; height: 20px; flex-shrink: 0; border-radius: 50%;
            background-color: #555;
            display: inline-flex; align-items: center; justify-content: center;
            background-position: center; background-repeat: no-repeat;
            background-size: 12px;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round'><path d='M12 7v5l3 2'/></svg>");
            transition: background-color 0.15s ease;
        }
        .approval-row.is-approved .approval-status {
            background-color: #00A911;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='5 12 10 17 19 7'/></svg>");
        }

        /* Release CTA — enabled when all members have approved */
        .project-release { margin-top: 14px; width: 100%; }
        .project-release__btn {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(0, 169, 17, 0.1);
            border: 1px solid #00A911;
            color: #00A911;
            font-family: inherit;
            font-weight: 700; font-size: 12px; line-height: 1;
            text-transform: uppercase; letter-spacing: 0.5px;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            transition: background 0.15s ease;
        }
        .project-release__btn:hover { background: rgba(0, 169, 17, 0.18); }
        .project-release__btn:disabled {
            background: transparent;
            border-color: #797979;
            color: #B1B1B1;
            cursor: not-allowed;
        }
        .project-release__btn:disabled:hover { background: transparent; }
        .project-release__progress { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; opacity: 0.85; }
        .project-release__btn:not(:disabled) .project-release__label::before { content: "✓ "; }

        /* Tracks list inside the card */
        .pc-tracks { margin-top: 22px; }
        .pc-tracks h4 {
            margin: 0 0 12px 0; font-weight: 700; font-size: 14px;
            text-transform: uppercase; color: #FFFFFF;
        }

        .pc-invite-row { display: flex; gap: 8px; margin: 14px 0 6px 0; flex-wrap: wrap; }
        .pc-invite-row input {
            flex: 1; min-width: 180px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 999px; padding: 8px 14px; color: #FFFFFF;
            font-family: inherit; font-size: 13px;
        }
        .pc-invite-feedback { font-size: 12px; min-height: 14px; color: #B1B1B1; margin: 0 0 4px 4px; }
        .pc-invite-feedback.is-error { color: #FF6B6B; }
        .pc-invite-feedback.is-success { color: #5CD66B; }

        /* Narrow viewport — stack the action cluster below the team */
        @container projectcard (max-width: 870px) {
            .pc-body { flex-direction: column; }
            .project-actions { margin-left: 0; }
            .button-group--approvals { width: 100%; }
        }

        /* Kebab menu — top-right of each card on the list view */
        .pc-header { position: relative; }
        .pc-menu { margin-left: auto; position: relative; }
        .pc-menu__trigger {
            background: transparent; border: 1px solid transparent;
            color: #B1B1B1; font-size: 22px; line-height: 1;
            width: 32px; height: 32px;
            border-radius: 8px; cursor: pointer;
            font-family: inherit;
            display: inline-flex; align-items: center; justify-content: center;
            padding-bottom: 6px;
        }
        .pc-menu__trigger:hover { border-color: #797979; color: #FFFFFF; }
        .pc-menu__dropdown {
            position: absolute; top: calc(100% + 4px); right: 0;
            min-width: 180px;
            background: #181818;
            border: 1px solid #797979;
            border-radius: 8px;
            padding: 4px;
            z-index: 50;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
        }
        .pc-menu__item {
            display: block; width: 100%;
            background: transparent; border: none;
            color: #FFFFFF; font-family: inherit;
            font-size: 13px; text-align: left;
            padding: 8px 12px; border-radius: 6px;
            cursor: pointer;
        }
        .pc-menu__item:hover { background: rgba(255,255,255,0.06); }
        .pc-menu__item--danger { color: #FF6B6B; }
        .pc-menu__item--danger:hover { background: rgba(255,107,107,0.12); }

        /* Add-member modal */
        .pj-am-search {
            width: 100%; box-sizing: border-box;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.18);
            border-radius: 999px; padding: 10px 16px;
            color: #FFFFFF; font-family: inherit; font-size: 14px;
            margin-bottom: 10px;
        }
        .pj-am-search:focus { outline: none; border-color: #FFFFFF; }
        .pj-am-status {
            color: #B1B1B1; font-size: 12px; margin: 0 0 8px 4px; min-height: 16px;
        }
        .pj-am-status.is-error { color: #FF6B6B; }
        .pj-am-status.is-success { color: #5CD66B; }
        .pj-am-list {
            max-height: 360px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 6px;
            margin-bottom: 4px;
        }
        .pj-am-row {
            display: flex; align-items: center; gap: 12px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
        }
        .pj-am-row__avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: #5A6480; font-size: 13px; font-weight: 600;
            flex-shrink: 0;
        }
        .pj-am-row__info { flex: 1; min-width: 0; }
        .pj-am-row__name { color: #FFFFFF; font-size: 14px; font-weight: 300; }
        .pj-am-row__name strong { font-weight: 700; }
        .pj-am-row__handle { color: #7E89A6; font-size: 12px; }
        .pj-am-row__add {
            background: #FFFFFF; color: #0B0B0F; border: none;
            border-radius: 999px; padding: 6px 14px;
            font-family: inherit; font-size: 12px; font-weight: 600;
            cursor: pointer;
        }
        .pj-am-row__add:hover { background: #E0E0E0; }
        .pj-am-row__add:disabled { opacity: 0.6; cursor: not-allowed; }
        .pj-am-row--already .pj-am-row__add {
            background: transparent; color: #7E89A6; cursor: default;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .pj-am-empty { color: #7E89A6; font-size: 13px; padding: 24px; text-align: center; }

        /* Approval rows: click own row to toggle */
        .approval-row.is-self { cursor: pointer; }
        .approval-row.is-self:hover { border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.04); }
        .approval-row__hint { color: #7E89A6; font-size: 11px; text-transform: none; margin-left: 6px; }
        .approval-row.is-approved .approval-row__hint { color: #5CD66B; }

        /* Wider modal variant for file lists + royalty splits */
        .pj-modal--wide { max-width: 560px; }

        /* Files modal */
        .pj-files-list {
            margin: 8px 0 14px 0;
            max-height: 320px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 8px;
        }
        .pj-files-list:empty::before {
            content: "No files yet.";
            color: #7E89A6; font-size: 13px; padding: 24px 0; text-align: center; display: block;
        }
        .pj-file-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
        }
        .pj-file-row__info { flex: 1; min-width: 0; }
        .pj-file-row__name {
            color: #FFFFFF; font-size: 13px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .pj-file-row__meta { color: #7E89A6; font-size: 11px; margin-top: 2px; }
        .pj-file-row__meta strong { color: #B1B1B1; font-weight: 700; }
        .pj-file-row__open, .pj-file-row__del {
            background: transparent; border: 1px solid rgba(255,255,255,0.2);
            color: #FFFFFF; border-radius: 999px;
            padding: 5px 11px; font-family: inherit; font-size: 11px;
            cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center;
        }
        .pj-file-row__open:hover { border-color: #FFFFFF; background: rgba(255,255,255,0.06); }
        .pj-file-row__del:hover { border-color: #FF6B6B; color: #FF6B6B; }
        .pj-file-upload {
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
            padding: 14px 0 4px 0;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .pj-file-status { color: #B1B1B1; font-size: 12px; flex: 1; }
        .pj-file-status.is-error { color: #FF6B6B; }
        .pj-file-status.is-success { color: #5CD66B; }

        /* Royalty modal */
        .pj-royalty-rows { display: flex; flex-direction: column; gap: 8px; margin: 8px 0 12px 0; max-height: 320px; overflow-y: auto; }
        .pj-royalty-row {
            display: flex; align-items: center; gap: 12px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
        }
        .pj-royalty-row__avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: #5A6480; font-size: 12px; font-weight: 600;
            flex-shrink: 0;
        }
        .pj-royalty-row__name { flex: 1; min-width: 0; color: #FFFFFF; font-size: 13px; font-weight: 300; }
        .pj-royalty-row__name strong { font-weight: 700; }
        .pj-royalty-row__input {
            width: 78px; text-align: right;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.18);
            border-radius: 6px; padding: 6px 8px;
            color: #FFFFFF; font-family: inherit; font-size: 13px;
        }
        .pj-royalty-row__pct { color: #B1B1B1; font-size: 12px; }
        .pj-royalty-total {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 12px; margin-bottom: 12px;
            background: rgba(255,255,255,0.04); border-radius: 10px;
            color: #FFFFFF; font-size: 13px; font-weight: 600;
        }
        .pj-royalty-total__val { font-family: 'SF Mono', Monaco, monospace; }
        .pj-royalty-total.is-valid { color: #5CD66B; }
        .pj-royalty-total.is-invalid { color: #FF6B6B; }
        .pj-royalty-readonly { color: #B1B1B1; font-size: 12px; margin-top: 4px; text-align: center; }
    </style>
</head>
<body class="app-body">

    <div data-app-shell data-page-title="Projects"></div>

    <main class="app-main"><div class="pj-wrap">
        <div id="pjContent">
            <div class="pj-empty">Loading…</div>
        </div>
    </div></main>

    <!-- Add member modal: search artists and add to project -->
    <div class="pj-modal-overlay" id="pjAddMemberModal">
        <div class="pj-modal pj-modal--wide">
            <h2 id="pjAddMemberTitle">Add member</h2>
            <input type="search" class="pj-am-search" id="pjAddMemberSearch" placeholder="Search by name or username…" autocomplete="off">
            <div class="pj-am-status" id="pjAddMemberStatus"></div>
            <div class="pj-am-list" id="pjAddMemberList"></div>
            <div class="pj-modal-actions" style="margin-top: 14px;">
                <button type="button" class="pj-btn pj-btn--ghost" id="pjAddMemberClose">Close</button>
            </div>
        </div>
    </div>

    <!-- Files modal: list + upload for a single (category, file_type) -->
    <div class="pj-modal-overlay" id="pjFilesModal">
        <div class="pj-modal pj-modal--wide">
            <h2 id="pjFilesModalTitle">Files</h2>
            <div class="pj-files-list" id="pjFilesList"></div>
            <div class="pj-file-upload">
                <input type="file" id="pjFileInput" hidden>
                <button type="button" class="pj-btn" id="pjFileUploadBtn">Upload new file</button>
                <span class="pj-file-status" id="pjFileStatus"></span>
            </div>
            <div class="pj-modal-actions" style="margin-top: 14px;">
                <button type="button" class="pj-btn pj-btn--ghost" id="pjFilesClose">Close</button>
            </div>
        </div>
    </div>

    <!-- Royalty modal: per-member percentage split -->
    <div class="pj-modal-overlay" id="pjRoyaltyModal">
        <div class="pj-modal pj-modal--wide">
            <h2 id="pjRoyaltyModalTitle">Royalty split</h2>
            <div class="pj-royalty-rows" id="pjRoyaltyRows"></div>
            <div class="pj-royalty-total">
                <span>Total</span>
                <span><span class="pj-royalty-total__val" id="pjRoyaltyTotalVal">0.00</span> / 100.00 %</span>
            </div>
            <div class="pj-modal-error" id="pjRoyaltyError"></div>
            <div class="pj-royalty-readonly" id="pjRoyaltyReadonly" hidden>Only the project owner can change royalty splits.</div>
            <div class="pj-modal-actions">
                <button type="button" class="pj-btn pj-btn--ghost" id="pjRoyaltyCancel">Cancel</button>
                <button type="button" class="pj-btn pj-btn--ghost" id="pjRoyaltyEqualize">Split evenly</button>
                <button type="button" class="pj-btn" id="pjRoyaltySave">Save</button>
            </div>
        </div>
    </div>

    <div class="pj-modal-overlay" id="pjModal">
        <div class="pj-modal">
            <h2 id="pjModalTitle">New project</h2>
            <form id="pjModalForm">
                <div class="pj-modal-field">
                    <label for="pj-title">Title</label>
                    <input id="pj-title" type="text" maxlength="200" placeholder="e.g. Summer EP" required>
                </div>
                <div class="pj-modal-field">
                    <label for="pj-desc">Description <span style="opacity:0.6;">(optional)</span></label>
                    <textarea id="pj-desc" maxlength="2000" placeholder="What is this project about? Who's involved? When are you releasing it?"></textarea>
                </div>
                <div class="pj-modal-field" id="pjStatusField" style="display:none;">
                    <label for="pj-status-input">Status</label>
                    <select id="pj-status-input" class="pj-status-select">
                        <option value="in_progress">In progress</option>
                        <option value="released">Released</option>
                        <option value="archived">Archived</option>
                    </select>
                </div>
                <div class="pj-modal-error" id="pjModalError"></div>
                <div class="pj-modal-actions">
                    <button type="button" class="pj-btn pj-btn--ghost" id="pjModalCancel">Cancel</button>
                    <button type="submit" class="pj-btn" id="pjModalSubmit">Create</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/format.js"></script>
    <script src="../js/app-shell.js"></script>
    <script src="../js/projects.js"></script>
</body>
</html>
