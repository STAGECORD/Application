<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAGECORD — Profile</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/logo.css">
    <link rel="stylesheet" href="../css/start.css">
    <style>
        .pp-wrap { max-width: 720px; margin: 0 auto; padding: 32px 24px 60px; }
        .pp-cover {
            width: 100%; height: 200px;
            border-radius: 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            background-size: cover; background-position: center;
            margin-bottom: 12px;
        }
        .pp-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 36px;
        }
        .pp-card.has-cover { margin-top: -50px; position: relative; z-index: 2; backdrop-filter: blur(2px); }
        .pp-header { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
        .pp-avatar {
            width: 128px; height: 128px; border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            background-size: cover; background-position: center;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        }
        .pp-avatar__initial {
            color: #5A6480; font-size: 42px; font-weight: 600;
        }
        .pp-meta { flex: 1; min-width: 220px; }
        .pp-name { margin: 0 0 4px 0; color: #FFFFFF; font-size: 28px; font-weight: 600; line-height: 1.2; }
        .pp-handle { margin: 0 0 14px 0; color: #7E89A6; font-size: 15px; }
        .pp-role-tag {
            display: inline-block; padding: 4px 12px; border-radius: 999px;
            background: rgba(56,134,252,0.18); color: #6FA8FF;
            font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em;
        }
        .pp-bio {
            margin: 28px 0 0 0; padding: 24px 0 0 0;
            border-top: 1px solid rgba(255,255,255,0.06);
            color: #D1D6E0; font-size: 16px; line-height: 1.6;
            white-space: pre-wrap;
        }
        .pp-empty {
            text-align: center; padding: 60px 20px;
            color: #7E89A6;
        }
        .pp-empty h2 {
            margin: 0 0 12px 0; color: #FFFFFF;
            font-size: 24px; font-weight: 600;
        }
        .pp-empty a {
            color: #FFFFFF; text-decoration: underline;
        }
        .pp-cta-row {
            display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap;
        }
        .pp-btn {
            background: #FFFFFF; color: #0B0B0F;
            padding: 11px 22px; border-radius: 999px;
            text-decoration: none; font-weight: 600; font-size: 14px;
        }
        .pp-btn--ghost {
            background: transparent; color: #FFFFFF;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .pp-posts {
            margin-top: 28px;
        }
        .pp-posts__heading {
            display: flex; align-items: baseline; gap: 12px; margin: 0 0 14px 0;
            color: #FFFFFF; font-size: 18px; font-weight: 600;
        }
        .pp-posts__count { color: #7E89A6; font-size: 13px; font-weight: 400; }
        .pp-post {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 12px;
        }
        .pp-post__head {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px;
            color: #7E89A6; font-size: 13px;
        }
        .pp-post__time { margin-left: auto; color: #5A6480; font-size: 12px; }
        .pp-post__content {
            margin: 0; color: #D1D6E0;
            font-size: 15px; line-height: 1.55;
            white-space: pre-wrap; word-wrap: break-word;
        }
        .pp-post__image {
            margin: 12px 0 0 0; max-width: 100%;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
            display: block;
        }
        .pp-posts__empty {
            background: rgba(255,255,255,0.02);
            border: 1px dashed rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 32px 20px; text-align: center;
            color: #7E89A6; font-size: 14px;
        }

        .pp-tracks { margin-top: 28px; }
        .pp-track {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 10px;
        }
        .pp-track__head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .pp-track__title { margin: 0; color: #FFFFFF; font-size: 15px; font-weight: 600; flex: 1; min-width: 0; }
        .pp-track__time { color: #5A6480; font-size: 12px; }
        .pp-track__desc {
            margin: 0 0 8px 0; color: #D1D6E0;
            font-size: 14px; line-height: 1.5;
            white-space: pre-wrap;
        }
        .pp-track audio {
            width: 100%; margin-top: 4px;
            filter: invert(0.85) hue-rotate(180deg);
        }

        .pp-follow-row {
            display: flex; gap: 18px; margin-top: 14px;
            color: #D1D6E0; font-size: 14px; align-items: center; flex-wrap: wrap;
        }
        .pp-follow-stat strong { color: #FFFFFF; font-weight: 600; margin-right: 4px; }
        .pp-follow-btn {
            background: #FFFFFF; color: #0B0B0F; border: none;
            border-radius: 999px; padding: 8px 18px;
            font-weight: 600; cursor: pointer; font-size: 13px;
            margin-left: auto;
        }
        .pp-follow-btn:disabled { opacity: 0.6; cursor: wait; }
        .pp-follow-btn--following {
            background: transparent; color: #FFFFFF;
            border: 1px solid rgba(255,255,255,0.24);
        }
        .pp-follow-btn--following:hover {
            background: rgba(255,107,107,0.12); border-color: rgba(255,107,107,0.6); color: #FF6B6B;
        }

        .pp-events { margin-top: 28px; }
        .pp-event {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 56px 1fr;
            gap: 14px;
            align-items: center;
        }
        .pp-event__date {
            background: rgba(56,134,252,0.12);
            border: 1px solid rgba(56,134,252,0.24);
            border-radius: 10px;
            padding: 6px 4px;
            text-align: center;
        }
        .pp-event__day { color: #FFFFFF; font-size: 20px; font-weight: 700; line-height: 1; }
        .pp-event__month { color: #6FA8FF; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
        .pp-event__title { margin: 0; color: #FFFFFF; font-size: 15px; font-weight: 600; }
        .pp-event__where { color: #D1D6E0; font-size: 13px; margin-top: 3px; }
        .pp-event__time { color: #7E89A6; font-size: 12px; margin-top: 2px; }
        .pp-event__ticket {
            color: #FFFFFF; text-decoration: underline;
            font-size: 13px; margin-top: 6px; display: inline-block;
        }

        /* Comments — same look as in /welcome/ */
        .cm-toggle {
            display: block; width: 100%;
            background: transparent; border: none;
            color: #7E89A6; font-size: 13px;
            text-align: left; padding: 10px 0 0 0;
            cursor: pointer; font-family: inherit;
            margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.06);
        }
        .cm-toggle:hover { color: #FFFFFF; }
        .cm-thread {
            margin-top: 12px; padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .cm-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
        .cm-empty { color: #7E89A6; font-size: 13px; padding: 6px 0; }
        .cm { display: flex; gap: 10px; align-items: flex-start; }
        .cm__avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: #5A6480; font-size: 13px; font-weight: 600;
            flex-shrink: 0;
        }
        .cm__body { flex: 1; min-width: 0; }
        .cm__head { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; font-size: 13px; }
        .cm__author { color: #FFFFFF; font-weight: 600; text-decoration: none; }
        .cm__author:hover { text-decoration: underline; }
        .cm__time { color: #5A6480; font-size: 12px; }
        .cm__delete {
            background: transparent; border: none; color: #5A6480;
            cursor: pointer; font-size: 14px; padding: 2px 6px;
            margin-left: auto;
        }
        .cm__delete:hover { color: #FF6B6B; }
        .cm__content {
            margin: 0; color: #D1D6E0; font-size: 14px; line-height: 1.5;
            white-space: pre-wrap; word-wrap: break-word;
        }
        .cm-composer { display: flex; gap: 8px; align-items: center; }
        .cm-composer__input {
            flex: 1; min-width: 0;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px; padding: 9px 14px; color: #FFFFFF;
            font-family: inherit; font-size: 14px;
        }
        .cm-composer__btn {
            background: #FFFFFF; color: #0B0B0F; border: none;
            border-radius: 999px; padding: 8px 16px;
            font-weight: 600; cursor: pointer; font-size: 13px;
        }
        .cm-composer__btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .like-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: transparent; border: none;
            color: #7E89A6; cursor: pointer;
            padding: 6px 10px; border-radius: 999px;
            font-family: inherit; font-size: 13px;
            transition: color 0.15s ease, background 0.15s ease;
        }
        .like-btn:hover { background: rgba(255,255,255,0.05); color: #FFFFFF; }
        .like-btn--active { color: #FF6B6B; }
        .like-btn--active:hover { color: #FF6B6B; background: rgba(255,107,107,0.08); }
        .like-btn__icon { display: inline-flex; }
        .like-btn__label { color: inherit; opacity: 0.85; }
        .pp-actions { display: flex; align-items: center; gap: 4px; margin-top: 10px; }
        .cm__reply-btn {
            background: transparent; border: none; color: #7E89A6;
            cursor: pointer; font-size: 12px; padding: 4px 0;
            margin-top: 4px; font-family: inherit;
        }
        .cm__reply-btn:hover { color: #FFFFFF; }
        .cm__reply-composer { margin-top: 8px; display: flex; gap: 8px; align-items: center; }
        .cm-replies {
            margin-left: 42px; margin-top: 10px;
            padding-left: 12px;
            border-left: 1px solid rgba(255,255,255,0.06);
            display: flex; flex-direction: column; gap: 10px;
        }
    </style>
</head>
<body class="start-body">

    <header class="start-topbar">
        <a href="/" class="start-topbar__logo">
            <h1 class="logo">
                <span class="logo-stage">STAGE</span><span class="logo-cord">CORD</span>
            </h1>
            <span class="start-topbar__beta">Beta</span>
        </a>

        <nav class="start-topbar__links" id="ppTopbarNav">
            <!-- populated based on auth state -->
        </nav>
    </header>

    <main class="pp-wrap">
        <div id="ppContent">
            <div class="pp-empty">Loading profile…</div>
        </div>
    </main>

    <footer class="start-footer">
        <div class="start-footer__inner">
            <p class="start-footer__brand">STAGECORD &nbsp;<span>·</span>&nbsp; Closed Beta · 2026</p>
            <nav class="start-footer__nav">
                <a href="/">Home</a>
                <a href="mailto:hello@stagecord.com">hello@stagecord.com</a>
            </nav>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/likes.js"></script>
    <script src="../js/comments.js"></script>
    <script>
    (async function () {
        const sb = window.supabaseClient;
        const content = document.getElementById('ppContent');
        const nav = document.getElementById('ppTopbarNav');

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, (c) => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        const params = new URLSearchParams(window.location.search);
        let username = (params.get('username') || params.get('u') || '').trim();
        if (!username) {
            // /u/<username> via vercel rewrite — pull from path segment
            const pathMatch = window.location.pathname.match(/^\/u\/([^\/?#]+)/);
            if (pathMatch) username = decodeURIComponent(pathMatch[1]).trim();
        }

        const { data: { session } } = await sb.auth.getSession();
        const ownUsername = session?.user?.user_metadata?.username || null;

        if (session) {
            nav.innerHTML = `
                <a href="/welcome/" class="start-topbar__link">Home</a>
                <a href="/profile/" class="start-topbar__link">Edit profile</a>
            `;
        } else {
            nav.innerHTML = `
                <a href="/login/" class="start-topbar__link">Log in</a>
                <a href="/" class="start-topbar__link start-topbar__link--cta">Join the waitlist</a>
            `;
        }

        if (!username) {
            content.innerHTML = `
                <div class="pp-empty">
                    <h2>No profile selected</h2>
                    <p>Open a STAGECORD profile by visiting <code>/u/&lt;username&gt;</code>.</p>
                </div>
            `;
            return;
        }

        const { data, error } = await sb.rpc('get_public_profile', { p_username: username });

        if (error) {
            console.error('get_public_profile failed:', error);
            content.innerHTML = `
                <div class="pp-empty">
                    <h2>Couldn't load profile</h2>
                    <p>Try refreshing — if the problem sticks, drop us a line at hello@stagecord.com.</p>
                </div>
            `;
            return;
        }

        if (!data || data.length === 0 || !data[0]) {
            content.innerHTML = `
                <div class="pp-empty">
                    <h2>Profile not found</h2>
                    <p>No STAGECORD member uses the username <strong style="color:#FFFFFF;">${escapeHtml(username)}</strong>.</p>
                    <p style="margin-top:16px;">${session ? '' : '<a href="/">Join the waitlist →</a>'}</p>
                </div>
            `;
            document.title = 'STAGECORD — Profile not found';
            return;
        }

        const profile = data[0];
        const fullName = [profile.forename, profile.surname].filter(Boolean).join(' ') || profile.username || 'STAGECORD member';
        const roleLabel = profile.role === 'artist' ? 'Artist' : (profile.role === 'fan' ? 'Fan' : profile.role);
        const initial = (fullName[0] || '?').toUpperCase();

        document.title = `${fullName} · STAGECORD`;

        const avatarHtml = profile.avatar_url
            ? `<div class="pp-avatar" style="background-image:url('${escapeHtml(profile.avatar_url)}');"></div>`
            : `<div class="pp-avatar"><span class="pp-avatar__initial">${escapeHtml(initial)}</span></div>`;

        const coverHtml = profile.cover_url
            ? `<div class="pp-cover" style="background-image:url('${escapeHtml(profile.cover_url)}');"></div>`
            : '';

        const bioHtml = profile.bio
            ? `<div class="pp-bio">${escapeHtml(profile.bio)}</div>`
            : '';

        const isOwn = ownUsername && ownUsername.toLowerCase() === username.toLowerCase();
        const ownCtas = isOwn ? `
            <div class="pp-cta-row">
                <a href="/profile/" class="pp-btn">Edit your profile</a>
                <a href="/welcome/" class="pp-btn pp-btn--ghost">Back to dashboard</a>
            </div>
        ` : '';

        content.innerHTML = `
            ${coverHtml}
            <div class="pp-card${profile.cover_url ? ' has-cover' : ''}">
                <div class="pp-header">
                    ${avatarHtml}
                    <div class="pp-meta">
                        <h2 class="pp-name">${escapeHtml(fullName)}</h2>
                        <p class="pp-handle">@${escapeHtml(profile.username || username)}</p>
                        ${roleLabel ? `<span class="pp-role-tag">${escapeHtml(roleLabel)}</span>` : ''}
                    </div>
                </div>
                <div class="pp-follow-row" id="ppFollowRow">
                    <span class="pp-follow-stat"><strong id="ppFollowerCount">—</strong>followers</span>
                    <span class="pp-follow-stat"><strong id="ppFollowingCount">—</strong>following</span>
                    <button id="ppMessageBtn" class="pp-follow-btn pp-follow-btn--following" style="display:none;">Message</button>
                    <button id="ppFollowBtn" class="pp-follow-btn" style="display:none;">Follow</button>
                </div>
                ${bioHtml}
                ${ownCtas}
            </div>
            <section class="pp-events" id="ppEvents"></section>
            <section class="pp-tracks" id="ppTracks"></section>
            <section class="pp-posts" id="ppPosts">
                <div class="pp-posts__empty">Loading posts…</div>
            </section>
        `;

        async function loadFollowSummary() {
            const { data: summary, error: sumErr } = await sb.rpc('get_follow_summary', {
                p_username: profile.username || username
            });
            if (sumErr) {
                console.error('get_follow_summary failed:', sumErr);
                return;
            }
            const row = (summary && summary[0]) || {};
            document.getElementById('ppFollowerCount').textContent = (row.follower_count ?? 0) + ' ';
            document.getElementById('ppFollowingCount').textContent = (row.following_count ?? 0) + ' ';
            const btn = document.getElementById('ppFollowBtn');
            if (session && !isOwn) {
                const isFollowing = !!row.viewer_is_following;
                btn.style.display = '';
                btn.textContent = isFollowing ? 'Following' : 'Follow';
                btn.classList.toggle('pp-follow-btn--following', isFollowing);
                btn.dataset.following = isFollowing ? '1' : '';
            }
        }

        const messageBtn = document.getElementById('ppMessageBtn');
        if (messageBtn && session && !isOwn) {
            messageBtn.style.display = '';
            messageBtn.style.marginLeft = '0';
            messageBtn.addEventListener('click', async () => {
                messageBtn.disabled = true;
                messageBtn.textContent = 'Opening…';
                const { data, error: convoErr } = await sb.rpc('start_or_get_conversation', {
                    p_target_username: profile.username || username
                });
                if (convoErr) {
                    console.error('start_or_get_conversation failed:', convoErr);
                    alert('Could not start conversation: ' + (convoErr.message || ''));
                    messageBtn.disabled = false;
                    messageBtn.textContent = 'Message';
                    return;
                }
                window.location.href = `/inbox/?c=${encodeURIComponent(data)}`;
            });
        }

        const followBtn = document.getElementById('ppFollowBtn');
        if (followBtn && session && !isOwn) {
            followBtn.addEventListener('click', async () => {
                followBtn.disabled = true;
                const wasFollowing = followBtn.dataset.following === '1';
                followBtn.textContent = wasFollowing ? 'Unfollowing…' : 'Following…';
                const { data, error: tErr } = await sb.rpc('toggle_follow', {
                    p_target_username: profile.username || username
                });
                followBtn.disabled = false;
                if (tErr) {
                    console.error('toggle_follow failed:', tErr);
                    followBtn.textContent = wasFollowing ? 'Following' : 'Follow';
                    alert('Could not update follow: ' + (tErr.message || 'try again'));
                    return;
                }
                await loadFollowSummary();
            });
        }

        loadFollowSummary();

        function timeAgo(iso) {
            const t = new Date(iso).getTime();
            const diff = (Date.now() - t) / 1000;
            if (diff < 60) return 'just now';
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
            return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function fmtDuration(secs) {
            if (!secs && secs !== 0) return '';
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function fmtEventDate(iso) {
            const d = new Date(iso);
            return {
                day: d.getDate(),
                month: d.toLocaleDateString('en-US', { month: 'short' }),
                time: d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }),
                full: d.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })
            };
        }

        const eventsEl = document.getElementById('ppEvents');
        const { data: events, error: evErr } = await sb.rpc('get_user_events', {
            p_username: profile.username || username,
            p_upcoming_only: true,
            p_limit: 20
        });

        if (evErr) {
            console.error('get_user_events failed:', evErr);
        } else if (events && events.length > 0) {
            const eventsHtml = events.map((e) => {
                const f = fmtEventDate(e.starts_at);
                const where = [e.venue_name, e.city].filter(Boolean).map(escapeHtml).join(' · ');
                const ticket = e.ticket_url
                    ? `<a class="pp-event__ticket" href="${escapeHtml(e.ticket_url)}" target="_blank" rel="noopener">Tickets ↗</a>`
                    : '';
                return `<article class="pp-event">
                    <div class="pp-event__date">
                        <div class="pp-event__day">${f.day}</div>
                        <div class="pp-event__month">${escapeHtml(f.month)}</div>
                    </div>
                    <div>
                        <h3 class="pp-event__title">${escapeHtml(e.title)}</h3>
                        ${where ? `<div class="pp-event__where">${where}</div>` : ''}
                        <div class="pp-event__time">${escapeHtml(f.full)} · ${escapeHtml(f.time)}</div>
                        ${ticket}
                    </div>
                </article>`;
            }).join('');
            eventsEl.innerHTML = `
                <h3 class="pp-posts__heading">Upcoming events <span class="pp-posts__count">${events.length}</span></h3>
                ${eventsHtml}
            `;
        }

        const tracksEl = document.getElementById('ppTracks');
        const { data: tracks, error: tracksErr } = await sb.rpc('get_user_tracks', {
            p_username: profile.username || username,
            p_limit: 50
        });

        if (tracksErr) {
            console.error('get_user_tracks failed:', tracksErr);
        } else if (tracks && tracks.length > 0) {
            const tracksHtml = tracks.map((t) => {
                const dur = t.duration_seconds ? ` · ${fmtDuration(t.duration_seconds)}` : '';
                const desc = t.description
                    ? `<p class="pp-track__desc">${escapeHtml(t.description)}</p>`
                    : '';
                return `<article class="pp-track" data-track-id="${escapeHtml(t.id)}">
                    <header class="pp-track__head">
                        <h3 class="pp-track__title">${escapeHtml(t.title)}</h3>
                        <span class="pp-track__time">${escapeHtml(timeAgo(t.created_at))}${dur}</span>
                    </header>
                    ${desc}
                    <audio controls preload="none" src="${escapeHtml(t.audio_url)}"></audio>
                    <div class="pp-actions"></div>
                </article>`;
            }).join('');
            tracksEl.innerHTML = `
                <h3 class="pp-posts__heading">Music <span class="pp-posts__count">${tracks.length}</span></h3>
                ${tracksHtml}
            `;

            const trackViewerId = (await sb.auth.getSession()).data.session?.user?.id || null;
            tracks.forEach((t) => {
                const trackEl = tracksEl.querySelector(`[data-track-id="${t.id}"]`);
                if (!trackEl || !window.STAGECORD_Likes) return;
                const actions = trackEl.querySelector('.pp-actions');
                if (!actions) return;
                window.STAGECORD_Likes.render({
                    container: actions,
                    targetType: 'track',
                    targetId: t.id,
                    initialCount: Number(t.like_count) || 0,
                    initiallyLiked: !!t.viewer_has_liked,
                    currentUserId: trackViewerId
                });
            });
        }

        const postsEl = document.getElementById('ppPosts');
        const { data: posts, error: postsErr } = await sb.rpc('get_user_posts', {
            p_username: profile.username || username,
            p_limit: 30
        });

        if (postsErr) {
            console.error('get_user_posts failed:', postsErr);
            postsEl.innerHTML = `
                <h3 class="pp-posts__heading">Posts</h3>
                <div class="pp-posts__empty">Couldn't load posts.</div>
            `;
            return;
        }

        if (!posts || posts.length === 0) {
            postsEl.innerHTML = `
                <h3 class="pp-posts__heading">Posts</h3>
                <div class="pp-posts__empty">${isOwn ? "You haven't posted yet — try the composer on your dashboard." : "No posts yet."}</div>
            `;
            return;
        }

        const cards = posts.map((p) => {
            const contentBlock = p.content && p.content.trim()
                ? `<p class="pp-post__content">${escapeHtml(p.content)}</p>`
                : '';
            const imageBlock = p.image_url
                ? `<img class="pp-post__image" src="${escapeHtml(p.image_url)}" alt="">`
                : '';
            return `<article class="pp-post" data-post-id="${escapeHtml(p.id)}">
                <header class="pp-post__head">
                    <span>@${escapeHtml(p.username || username)}</span>
                    <span class="pp-post__time">${escapeHtml(timeAgo(p.created_at))}</span>
                </header>
                ${contentBlock}
                ${imageBlock}
                <div class="pp-actions"></div>
            </article>`;
        }).join('');

        postsEl.innerHTML = `
            <h3 class="pp-posts__heading">Posts <span class="pp-posts__count">${posts.length}</span></h3>
            ${cards}
        `;

        const currentUserId = session?.user?.id || null;
        posts.forEach((p) => {
            const postEl = postsEl.querySelector(`[data-post-id="${p.id}"]`);
            if (!postEl) return;

            if (window.STAGECORD_Likes) {
                const actions = postEl.querySelector('.pp-actions');
                if (actions) {
                    window.STAGECORD_Likes.render({
                        container: actions,
                        targetType: 'post',
                        targetId: p.id,
                        initialCount: Number(p.like_count) || 0,
                        initiallyLiked: !!p.viewer_has_liked,
                        currentUserId
                    });
                }
            }

            if (window.STAGECORD_Comments) {
                window.STAGECORD_Comments.attach({
                    postElement: postEl,
                    postId: p.id,
                    currentUserId
                });
            }
        });
    })();
    </script>
</body>
</html>
