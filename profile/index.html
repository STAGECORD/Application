<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>STAGECORD — Your profile</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/logo.css">
    <link rel="stylesheet" href="../css/start.css">
    <link rel="stylesheet" href="../css/waitlist.css">
    <link rel="stylesheet" href="../css/app-shell.css">
    <style>
        .profile-wrap { max-width: 720px; margin: 0 auto; padding: 24px 24px 60px; }
        .profile-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 28px; margin-bottom: 20px; }
        .profile-card h2 { margin: 0 0 18px 0; color: #FFFFFF; font-weight: 600; font-size: 20px; }
        .profile-row { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
        .profile-avatar-block { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .profile-avatar-wrap { position: relative; width: 120px; height: 120px; }
        .profile-avatar {
            width: 120px; height: 120px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; cursor: pointer; position: relative;
            background-size: cover; background-position: center;
        }
        .profile-avatar__placeholder {
            color: #5A6480; font-size: 12px; text-align: center;
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .profile-avatar__overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6);
            display: none; align-items: center; justify-content: center;
            color: #FFFFFF; font-size: 13px;
        }
        .profile-avatar:hover .profile-avatar__overlay { display: flex; }
        .profile-avatar input[type="file"] { display: none; }
        .profile-avatar__hint { color: #7E89A6; font-size: 12px; text-align: center; }
        .profile-avatar__remove {
            display: none;
            position: absolute; top: -4px; right: -4px;
            width: 28px; height: 28px; border-radius: 50%;
            background: #1a1f2e; color: #FFFFFF;
            border: 1px solid rgba(255,255,255,0.18);
            font-size: 18px; line-height: 1; cursor: pointer; padding: 0;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            z-index: 2;
        }
        .profile-avatar__remove:hover {
            background: #2a3142; border-color: rgba(255,107,107,0.6); color: #FF6B6B;
        }
        .profile-avatar-wrap.has-photo .profile-avatar__remove { display: block; }

        .profile-fields { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 14px; }
        .profile-field { display: flex; flex-direction: column; gap: 6px; }
        .profile-field label {
            font-size: 12px; color: #7E89A6;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .profile-field input, .profile-field textarea {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; padding: 11px 14px; color: #FFFFFF;
            font-family: inherit; font-size: 15px;
            width: 100%; box-sizing: border-box;
        }
        .profile-field input:read-only { opacity: 0.6; cursor: not-allowed; }
        .profile-field textarea { min-height: 96px; resize: vertical; }
        .profile-field__hint { font-size: 12px; color: #5A6480; }

        .profile-actions {
            display: flex; gap: 12px; align-items: center;
            margin-top: 24px; flex-wrap: wrap;
        }
        .profile-btn {
            background: #FFFFFF; color: #0B0B0F; border: none;
            border-radius: 999px; padding: 11px 22px;
            font-weight: 600; cursor: pointer; font-size: 14px;
        }
        .profile-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .profile-btn--ghost { background: transparent; color: #FFFFFF; border: 1px solid rgba(255,255,255,0.2); }
        .profile-feedback {
            font-size: 14px; margin-left: 4px;
            min-height: 18px;
        }
        .profile-feedback.is-success { color: #5CD66B; }
        .profile-feedback.is-error { color: #FF6B6B; }

        .cover-wrap {
            position: relative;
            margin-bottom: 18px;
        }
        .cover-photo {
            display: block; cursor: pointer;
            width: 100%; height: 180px; border-radius: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            background-size: cover; background-position: center;
            position: relative; overflow: hidden;
        }
        .cover-photo__placeholder {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #5A6480; font-size: 13px;
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .cover-photo__overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.55);
            display: none; align-items: center; justify-content: center;
            color: #FFFFFF; font-size: 14px;
        }
        .cover-photo:hover .cover-photo__overlay { display: flex; }
        .cover-photo input[type="file"] { display: none; }
        .cover-remove {
            display: none;
            position: absolute; top: 10px; right: 10px;
            width: 30px; height: 30px; border-radius: 50%;
            background: #1a1f2e; color: #FFFFFF;
            border: 1px solid rgba(255,255,255,0.18);
            font-size: 18px; line-height: 1; cursor: pointer; padding: 0;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            z-index: 2;
        }
        .cover-remove:hover {
            background: #2a3142; border-color: rgba(255,107,107,0.6); color: #FF6B6B;
        }
        .cover-wrap.has-cover .cover-remove { display: block; }
        .cover-hint { color: #7E89A6; font-size: 12px; margin-top: 6px; }
    </style>
</head>
<body class="app-body">

    <div data-app-shell data-page-title="Profile"></div>

    <main class="app-main"><div class="profile-wrap">
        <div class="profile-card">
            <h2 style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
                <span>Your profile</span>
                <a href="#" id="viewPublicProfileLink" style="display:none;color:#FFFFFF;font-size:13px;font-weight:400;text-decoration:underline;opacity:0.85;">View public profile →</a>
            </h2>

            <form id="profileForm">
                <div class="cover-wrap" id="coverWrap">
                    <label class="cover-photo" id="coverTrigger" title="Click to upload cover">
                        <span class="cover-photo__placeholder" id="coverPlaceholder">Click to add a cover photo</span>
                        <span class="cover-photo__overlay" id="coverOverlay">Change cover</span>
                        <input type="file" id="coverInput" accept="image/jpeg,image/png,image/webp">
                    </label>
                </div>

                <div class="profile-row">
                    <div class="profile-avatar-block">
                        <div class="profile-avatar-wrap">
                            <label class="profile-avatar" id="avatarTrigger" title="Click to upload">
                                <span class="profile-avatar__placeholder" id="avatarPlaceholder">No photo</span>
                                <span class="profile-avatar__overlay" id="avatarOverlay">Change photo</span>
                                <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/webp">
                            </label>
                        </div>
                    </div>

                    <div class="profile-fields">
                        <div class="profile-field">
                            <label for="profile-email">Email</label>
                            <input id="profile-email" type="email" readonly>
                            <span class="profile-field__hint">Your email is tied to your account and can't be changed here.</span>
                        </div>

                        <div class="profile-field">
                            <label for="profile-forename">First name</label>
                            <input id="profile-forename" type="text" autocomplete="given-name" required>
                        </div>

                        <div class="profile-field">
                            <label for="profile-surname">Last name</label>
                            <input id="profile-surname" type="text" autocomplete="family-name" required>
                        </div>

                        <div class="profile-field">
                            <label for="profile-username">Username</label>
                            <input id="profile-username" type="text" autocomplete="username" placeholder="lowercase letters, numbers, _ or - (3-30 chars)" pattern="[a-z0-9][a-z0-9_-]{2,29}">
                            <span class="profile-field__hint" id="usernameHint">Used for your shareable profile URL. Lowercase only.</span>
                        </div>

                        <div class="profile-field">
                            <label for="profile-bio">Bio</label>
                            <textarea id="profile-bio" placeholder="A short line about you — optional, shown on your public profile."></textarea>
                        </div>
                    </div>
                </div>

                <div class="profile-actions">
                    <button type="submit" class="profile-btn" id="profileSave">Save changes</button>
                    <button type="button" class="profile-btn profile-btn--ghost" id="profileCancel">Cancel</button>
                    <span class="profile-feedback" id="profileFeedback" role="status" aria-live="polite"></span>
                </div>
            </form>
        </div>
    </div></main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/app-shell.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
